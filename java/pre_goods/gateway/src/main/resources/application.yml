# 应用配置文件 - 测试 Sentinel
server:
  port: 8080

spring:
  application:
    name: gateway-service
  config:
    import: optional:nacos:192.168.199.130:8848
  autoconfigure:
    exclude:
      - com.alibaba.cloud.sentinel.gateway.scg.SentinelSCGAutoConfiguration
  cloud:
    nacos:
      config:
        server-addr: 192.168.199.130:8848
        file-extension: yml
        namespace: ""
        group: DEFAULT_GROUP
        refresh-enabled: true
      discovery:
        server-addr: 192.168.199.130:8848
        enabled: true
        namespace: ""
        group: DEFAULT_GROUP
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
      default-filters:
        - AddResponseHeader=X-Gateway, gateway-service
      routes:
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/user/**,/api/user/**
          filters:
            - StripPrefix=0

        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/order/**,/api/order/**
          filters:
            - StripPrefix=0

        - id: task-service
          uri: lb://task-service
          predicates:
            - Path=/task/**,/api/task/**
          filters:
            - StripPrefix=0

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true

logging:
  level:
    root: INFO
    org.springframework.cloud.gateway: DEBUG
    org.example: DEBUG
    com.alibaba.csp.sentinel: DEBUG

sentinel:
  metrics:
    enabled: true
    file-single-size: 10485760
    file-total-size: 52428800
  log:
    dir: logs/sentinel
    switch-prompt: true