# 引导配置文件 - 用于配置 Nacos 等外部化配置
spring:
  application:
    name: gateway-service  # 应用名称
  cloud:
    sentinel:
      enabled: true  # 启用 Sentinel
      transport:
        dashboard: localhost:9090  # Sentinel Dashboard 地址
        port: 8720  # Sentinel 客户端端口（gateway使用不同端口）
      eager: true  # 延迟加载控制台配置
