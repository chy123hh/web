server:
  port: 8085

spring:
  config:
    import: classpath:config/db-redis.yml
  application:
    name: evaluation-service
  datasource:
    url: jdbc:mysql://${db.host}:${db.port}/evaluation_service?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${db.username}
    password: ${db.password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${redis.host}
      port: ${redis.port}

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath:mapper/*.xml

jwt:
  secret: campus-help-secret-key-for-jwt-token-2024
  expire: 604800000

logging:
  level:
    org.example: debug
