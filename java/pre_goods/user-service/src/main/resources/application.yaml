spring:
  application:
    name: user-service
  datasource:
    url: jdbc:mysql://192.168.199.130:3306/user_service?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1800000

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      table-underline: true
  mapper-locations: classpath:mapper/*.xml

# JWT 配置
jwt:
  secret: campus-help-secret-key-for-jwt-token-2024
  expire: 604800000  # 7天（毫秒）

# Spring Boot Actuator 配置
management:
  endpoints:
    web:
      exposure:
        include: health,info  # 只暴露健康检查和基本信息接口
    endpoint:
      health:
        enabled: true
        show-details: when_authorized  # 详细信息只在授权时显示
      info:
        enabled: true

server:
  port: 8081