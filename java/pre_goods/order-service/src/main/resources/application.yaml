server:
  port: 8083

spring:
  application:
    name: order-service
  datasource:
    url: jdbc:mysql://${db.host}:${db.port}/order_service?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${db.username}
    password: ${db.password}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1800000
  data:
    redis:
      host: ${redis.host}
      port: ${redis.port}
      database: ${redis.database}
      timeout: ${redis.timeout}
      lettuce:
        pool:
          max-active: ${redis.lettuce.pool.max-active}
          max-idle: ${redis.lettuce.pool.max-idle}
          min-idle: ${redis.lettuce.pool.min-idle}

# Feign 配置
feign:
  sentinel:
    enabled: true  # 启用 Sentinel 对 Feign 的保护

# Sentinel 配置
sentinel:
  metrics:
    enabled: true
    file-single-size: 10485760
    file-total-size: 52428800
  log:
    dir: logs/sentinel
    switch-prompt: true
