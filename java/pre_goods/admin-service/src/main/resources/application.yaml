server:
  port: 8087

spring:
  application:
    name: admin-service
  config:
    import:
      - nacos:db-config.yml
      - nacos:redis-config.yml
      - nacos:jwt-config.yml
      - nacos:feign-config.yml
      - nacos:mybatis-config.yml
      - nacos:admin-service.yml
  cloud:
    compatibility-verifier:
      enabled: false
  datasource:
    url: jdbc:mysql://${db.host}:${db.port}/user_service?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${db.username}
    password: ${db.password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${redis.host}
      port: ${redis.port}
      database: ${redis.database}
      timeout: ${redis.timeout}
      lettuce:
        pool:
          max-active: ${redis.lettuce.pool.max-active}
          max-idle: ${redis.lettuce.pool.max-idle}
          min-idle: ${redis.lettuce.pool.min-idle}

logging:
  level:
    org.example: debug